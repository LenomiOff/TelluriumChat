<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Maintenance</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0f2c;
            font-family: Arial, sans-serif;
            color: white;
            cursor: none; /* cache la souris */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 3em;
            text-align: center;
            z-index: 10;
            transform: translate(-50%, -50%);
        }

        /* FLASH ECLAIR */
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<canvas id="rain"></canvas>

<div class="text" id="floatingText">
    🚧 Site en maintenance 🚧
</div>

<div class="flash" id="flash"></div>

<script>
/* ===== CANVAS ===== */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ===== SOURIS ===== */
let mouse = { x: canvas.width/2, y: canvas.height/2 };

window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* ===== PLUIE ===== */
let rainDrops = [];

for (let i = 0; i < 500; i++) {
    rainDrops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: Math.random() * 20,
        speed: Math.random() * 5 + 2
    });
}

function drawRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "rgba(174,194,224,0.5)";
    ctx.lineWidth = 1;

    for (let drop of rainDrops) {
        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y);
        ctx.lineTo(drop.x, drop.y + drop.length);
        ctx.stroke();

        drop.y += drop.speed;

        if (drop.y > canvas.height) {
            drop.y = -20;
            drop.x = Math.random() * canvas.width;
        }
    }
}

/* ===== HALO LUMIERE SOURIS ===== */
function drawLight() {
    let gradient = ctx.createRadialGradient(
        mouse.x, mouse.y, 0,
        mouse.x, mouse.y, 150
    );

    gradient.addColorStop(0, "rgba(120,180,255,0.4)");
    gradient.addColorStop(1, "rgba(0,0,0,0)");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* ===== TEXTE FLOTTANT ===== */
const text = document.getElementById("floatingText");
let t = 0;

function animateText() {
    t += 0.01;

    let x = Math.sin(t) * 15;
    let y = Math.cos(t * 0.8) * 10;
    let rot = Math.sin(t * 0.6) * 2;

    text.style.transform = `
        translate(-50%, -50%)
        translate(${x}px, ${y}px)
        rotate(${rot}deg)
    `;
}

/* ===== ECLAIR CLICK ===== */
const flash = document.getElementById("flash");

window.addEventListener("click", () => {
    flash.style.transition = "none";
    flash.style.opacity = 0.8;

    setTimeout(() => {
        flash.style.transition = "opacity 0.5s ease-out";
        flash.style.opacity = 0;
    }, 50);
});

/* ===== ANIMATION ===== */
function animate() {
    drawRain();
    drawLight();
    animateText();
    requestAnimationFrame(animate);
}

animate();

/* ===== RESIZE ===== */
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
