<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Tellurium Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#36393f;
color:white;
}

/* LOGIN */

.authBox{
width:350px;
background:#2f3136;
padding:30px;
border-radius:8px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.authBox input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
background:#202225;
color:white;
}

.authBox button{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:5px;
background:#5865f2;
color:white;
cursor:pointer;
}

.link{
font-size:13px;
text-align:center;
margin-top:10px;
}

.link span{
color:#00b0f4;
cursor:pointer;
text-decoration:underline;
}

/* APP */

#app{
display:none;
height:100vh;
display:flex;
}

#channels{
width:220px;
background:#2f3136;
padding:10px;
overflow:auto;
}

.channel{
padding:6px;
border-radius:5px;
cursor:pointer;
}

.channel:hover{
background:#40444b;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.message{
background:#40444b;
padding:6px;
border-radius:6px;
margin-bottom:5px;
}

.deleteBtn{
float:right;
cursor:pointer;
color:red;
}

#sendBar{
padding:10px;
background:#40444b;
}

#sendBar input{
width:100%;
padding:10px;
border:none;
border-radius:5px;
background:#2f3136;
color:white;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="authBox" id="loginBox">

<h2>Connexion</h2>

<input id="loginPseudo" placeholder="Pseudo">
<input id="loginPass" type="password" placeholder="Mot de passe">

<button onclick="login()">Se connecter</button>

<div class="link">
Vous n'avez pas de compte ?
<span onclick="showRegister()">Créer un compte</span>
</div>

</div>

<!-- REGISTER -->

<div class="authBox" id="registerBox" style="display:none">

<h2>Créer un compte</h2>

<input id="regPseudo" placeholder="Pseudo">
<input id="regPass" type="password" placeholder="Mot de passe">

<button onclick="register()">Créer</button>
<button onclick="backLogin()">Retour</button>

</div>

<!-- APP -->

<div id="app">

<div id="channels">

<h3>Salons</h3>

<div id="channelList"></div>

<button onclick="createChannel()">Créer un salon</button>

</div>

<div id="chatArea">

<div id="messages"></div>

<div id="sendBar">
<input id="msgInput" placeholder="Envoyer un message">
</div>

</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
get,
remove,
onChildAdded,
off
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAOvOV47JhlAUS1j5IaaCToDKYUrp4xHYw",
authDomain:"lenomioficialchat.firebaseapp.com",
databaseURL:"https://lenomioficialchat-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"lenomioficialchat"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase();

let pseudo="";
let currentChannel="";
let currentListener=null;
let isAdmin=false;

/* LOGIN */

window.login=async function(){

let p=loginPseudo.value
let pass=loginPass.value

if(p==="lenomi" && pass==="Laville33"){

pseudo=p
isAdmin=true

loginBox.style.display="none"
document.getElementById("app").style.display="flex"

loadChannels()

return

}

let snap=await get(ref(db,"users/"+p))

if(!snap.exists()){
alert("Compte introuvable")
return
}

if(snap.val().password!=pass){
alert("Mot de passe incorrect")
return
}

pseudo=p

loginBox.style.display="none"
document.getElementById("app").style.display="flex"

loadChannels()

}

/* REGISTER */

window.register=async function(){

let p=regPseudo.value
let pass=regPass.value

await set(ref(db,"users/"+p),{
password:pass
})

alert("Compte créé")

backLogin()

}

window.showRegister=function(){
loginBox.style.display="none"
registerBox.style.display="block"
}

window.backLogin=function(){
registerBox.style.display="none"
loginBox.style.display="block"
}

/* CHANNELS */

function loadChannels(){

channelList.innerHTML=""

onChildAdded(ref(db,"channels"),data=>{

let name=data.key

let div=document.createElement("div")
div.className="channel"
div.innerText="# "+name

div.onclick=()=>openChannel(name)

channelList.appendChild(div)

})

}

/* CREATE CHANNEL */

window.createChannel=async function(){

let name=prompt("Nom du salon")

if(!name)return

await set(ref(db,"channels/"+name),{
owner:pseudo
})

}

/* OPEN CHANNEL */

async function openChannel(name){

currentChannel=name

messages.innerHTML=""

/* stop old listener */

if(currentListener){
off(currentListener)
}

let msgRef=ref(db,"channels/"+name+"/messages")

currentListener=msgRef

let channelData=await get(ref(db,"channels/"+name))
let owner=channelData.val().owner

onChildAdded(msgRef,data=>{

let m=data.val()

let div=document.createElement("div")
div.className="message"

let deleteBtn=""

if(isAdmin || owner===pseudo){
deleteBtn=`<span class="deleteBtn" onclick="deleteMessage('${name}','${data.key}')">✖</span>`
}

div.innerHTML=`${deleteBtn}<b>${m.pseudo}</b> : ${m.text}`

messages.appendChild(div)

})

}

/* DELETE MESSAGE */

window.deleteMessage=function(channel,id){

remove(ref(db,"channels/"+channel+"/messages/"+id))

}

/* SEND MESSAGE */

msgInput.addEventListener("keypress",e=>{

if(e.key==="Enter"){

let text=e.target.value

if(text==="")return

push(ref(db,"channels/"+currentChannel+"/messages"),{
pseudo:pseudo,
text:text
})

e.target.value=""

}

})

</script>

</body>
</html>
