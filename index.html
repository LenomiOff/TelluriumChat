<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Maintenance</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0f2c;
            font-family: Arial, sans-serif;
            color: white;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 3em;
            text-align: center;
            z-index: 10;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<canvas id="rain"></canvas>

<div class="text" id="floatingText">
    🚧 Site en maintenance 🚧
</div>

<script>
/* ===== PLUIE ===== */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rainDrops = [];

for (let i = 0; i < 500; i++) {
    rainDrops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: Math.random() * 20,
        speed: Math.random() * 5 + 2
    });
}

function drawRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "rgba(174,194,224,0.5)";
    ctx.lineWidth = 1;

    for (let drop of rainDrops) {
        ctx.beginPath();
        ctx.moveTo(drop.x, drop.y);
        ctx.lineTo(drop.x, drop.y + drop.length);
        ctx.stroke();

        drop.y += drop.speed;

        if (drop.y > canvas.height) {
            drop.y = -20;
            drop.x = Math.random() * canvas.width;
        }
    }
}

/* ===== TEXTE FLOTTANT ULTRA SMOOTH ===== */
const text = document.getElementById("floatingText");
let t = 0;

function animateText() {
    t += 0.01; // vitesse globale (plus petit = plus smooth)

    let x = Math.sin(t) * 15;      // gauche/droite
    let y = Math.cos(t * 0.8) * 10; // haut/bas (différent pour effet naturel)
    let rot = Math.sin(t * 0.6) * 2; // rotation max ~2°

    text.style.transform = `
        translate(-50%, -50%)
        translate(${x}px, ${y}px)
        rotate(${rot}deg)
    `;
}

/* ===== ANIMATION ===== */
function animate() {
    drawRain();
    animateText();
    requestAnimationFrame(animate);
}

animate();

/* ===== RESIZE ===== */
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
