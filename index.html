<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>YouTube Lite</title>
</head>
<body style="background:black;color:white;font-family:sans-serif">

<h1>YouTube Lite</h1>

<input id="urlInput" placeholder="Colle un lien YouTube">
<button onclick="loadVideo()">Lire</button>

<br><br>

<iframe id="player" width="800" height="450" frameborder="0" allowfullscreen></iframe>

<script>
function loadVideo() {
  const url = document.getElementById("urlInput").value;

  // extraction ID vidéo
  let id = "";
  if (url.includes("watch?v=")) {
    id = url.split("watch?v=")[1];
  } else if (url.includes("youtu.be/")) {
    id = url.split("youtu.be/")[1];
  }

  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + id;
}
</script>

</body>
</html>
