<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tellurium Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#36393f;
color:white;
}

/* LOGIN */

.authBox{
width:350px;
background:#2f3136;
padding:30px;
border-radius:10px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.authBox h2{
text-align:center;
}

.authBox input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
background:#202225;
color:white;
}

.authBox button{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:5px;
background:#5865f2;
color:white;
font-weight:bold;
cursor:pointer;
}

.authBox button:hover{
background:#4752c4;
}

.link{
margin-top:10px;
text-align:center;
font-size:13px;
}

.link span{
color:#00b0f4;
text-decoration:underline;
cursor:pointer;
}

/* APP */

#app{
display:none;
height:100vh;
}

/* CHANNEL LIST */

#channels{
width:230px;
background:#2f3136;
padding:10px;
box-sizing:border-box;
overflow:auto;
}

.channel{
padding:8px;
border-radius:5px;
cursor:pointer;
}

.channel:hover{
background:#40444b;
}

/* CHAT */

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:15px;
}

.message{
background:#40444b;
padding:8px 12px;
border-radius:8px;
margin-bottom:6px;
}

#sendBar{
display:flex;
padding:10px;
background:#40444b;
}

#sendBar input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
background:#2f3136;
color:white;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="authBox" id="loginBox">

<h2>Connexion</h2>

<input id="loginPseudo" placeholder="Pseudo">
<input id="loginPass" type="password" placeholder="Mot de passe">

<button onclick="login()">Se connecter</button>

<div class="link">
Vous n'avez pas de compte ?
<span onclick="showRegister()">Créez-en un</span>
</div>

</div>


<!-- REGISTER -->

<div class="authBox" id="registerBox" style="display:none">

<h2>Créer un compte</h2>

<input id="regPseudo" placeholder="Pseudo">
<input id="regPass" type="password" placeholder="Mot de passe">

<button onclick="register()">Créer</button>

<button onclick="backLogin()">Retour</button>

</div>


<!-- APP -->

<div id="app">

<div id="channels">

<h3>Salons</h3>

<div id="channelList"></div>

<button onclick="createChannel()">Créer un salon</button>

</div>

<div id="chatArea">

<div id="messages"></div>

<div id="sendBar">
<input id="msgInput" placeholder="Envoyer un message">
</div>

</div>

</div>


<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
get,
onChildAdded,
onChildRemoved
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";


const firebaseConfig={
apiKey:"AIzaSyAOvOV47JhlAUS1j5IaaCToDKYUrp4xHYw",
authDomain:"lenomioficialchat.firebaseapp.com",
databaseURL:"https://lenomioficialchat-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"lenomioficialchat"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase();

let pseudo=""
let currentChannel=""

/* LOGIN */

window.login=async function(){

let p=document.getElementById("loginPseudo").value
let pass=document.getElementById("loginPass").value

let snap=await get(ref(db,"users/"+p))

if(!snap.exists()) return alert("Compte introuvable")

if(snap.val().password!=pass) return alert("Mot de passe incorrect")

pseudo=p

document.getElementById("loginBox").style.display="none"
document.getElementById("app").style.display="flex"

loadChannels()

}

/* REGISTER */

window.register=async function(){

let p=document.getElementById("regPseudo").value
let pass=document.getElementById("regPass").value

await set(ref(db,"users/"+p),{
password:pass
})

alert("Compte créé")

backLogin()

}

window.showRegister=function(){
document.getElementById("loginBox").style.display="none"
document.getElementById("registerBox").style.display="block"
}

window.backLogin=function(){
document.getElementById("registerBox").style.display="none"
document.getElementById("loginBox").style.display="block"
}


/* CHANNELS */

function loadChannels(){

const list=document.getElementById("channelList")

onChildAdded(ref(db,"channels"),data=>{

let name=data.key

let div=document.createElement("div")

div.className="channel"

div.innerText="# "+name

div.onclick=()=>openChannel(name)

list.appendChild(div)

})

}


window.createChannel=async function(){

let name=prompt("Nom du salon")

if(!name) return

let snap=await get(ref(db,"channels"))

let channels=snap.val()||{}

for(let c in channels){

if(channels[c].owner==pseudo){
alert("Tu as déjà un salon")
return
}

}

await set(ref(db,"channels/"+name),{
owner:pseudo
})

}


/* OPEN CHANNEL */

function openChannel(name){

currentChannel=name

document.getElementById("messages").innerHTML=""

onChildAdded(ref(db,"channels/"+name+"/messages"),data=>{

let m=data.val()

let div=document.createElement("div")

div.className="message"

div.innerHTML="<b>"+m.pseudo+"</b> : "+m.text

document.getElementById("messages").appendChild(div)

})

}


/* SEND MESSAGE */

document.getElementById("msgInput").addEventListener("keypress",e=>{

if(e.key=="Enter"){

let text=e.target.value

push(ref(db,"channels/"+currentChannel+"/messages"),{
pseudo:pseudo,
text:text
})

e.target.value=""

}

})

</script>

</body>
</html>
