<!DOCTYPE html>
<html>
<head>
<title>Tellurium-Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: Arial, sans-serif;
    background: #121212; /* fond sombre moderne */
    color: #fff;
    margin: 0;
    padding: 10px;
    box-sizing: border-box;
}

h2 {
    text-align: center;
    color: #00bfff; /* titre bleu clair */
    margin-bottom: 20px;
}

.container {
    max-width: 600px;
    margin: 0 auto;
}

#chat {
    height: 60vh;
    overflow: auto;
    border-radius: 15px;
    padding: 15px;
    background: #1f1f1f; /* couleur du chat */
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    margin-bottom: 15px;
}

#chat p {
    background: #272727; /* couleur des messages */
    padding: 8px 12px;
    border-radius: 12px;
    margin: 5px 0;
}

input, button {
    padding: 12px;
    font-size: 1em;
    margin: 5px 0;
    border-radius: 12px;
    border: none;
    box-sizing: border-box;
}

#pseudo, #msg {
    width: 100%;
    max-width: 100%;
}

button {
    width: 100%;
    max-width: 100%;
    background-color: #00bfff; /* bleu clair */
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background-color: #009acd; /* bleu foncé au hover */
}
</style>
</head>
<body>

<div class="container">
<h2>Tellurium-Chat</h2>

<input id="pseudo" placeholder="Ton pseudo">
<button onclick="setPseudo()">Appliquer pseudo</button>

<div id="chat"></div>

<input id="msg" placeholder="Écris ton message">
<button onclick="send()">Envoyer</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOvOV47JhlAUS1j5IaaCToDKYUrp4xHYw",
  authDomain: "lenomioficialchat.firebaseapp.com",
  databaseURL: "https://lenomioficialchat-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lenomioficialchat",
  storageBucket: "lenomioficialchat.firebasestorage.app",
  messagingSenderId: "501612652553",
  appId: "1:501612652553:web:2aa454ea5378e6a079f0d8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase();

let pseudo = "Invité";

function setPseudo(){
  let input = document.getElementById("pseudo").value.trim();
  if(input !== "") pseudo = input;
  document.getElementById("pseudo").value = "";
}

function send(){
  let msg = document.getElementById("msg").value.trim();
  if(msg=="") return;
  push(ref(db,"messages"), { text: msg, pseudo: pseudo });
  document.getElementById("msg").value="";
}

onChildAdded(ref(db,"messages"), (data)=>{
  let chat = document.getElementById("chat");
  let val = data.val();
  chat.innerHTML += "<p><b>"+val.pseudo+" :</b> "+val.text+"</p>";
  chat.scrollTop = chat.scrollHeight;
});

window.send = send;
window.setPseudo = setPseudo;
</script>

</body>
</html>
