<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tellurium Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#36393f;color:white;}

.authBox{
width:350px;background:#2f3136;padding:30px;border-radius:8px;
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
}

.authBox input{
width:100%;padding:10px;margin-top:10px;border:none;border-radius:5px;
background:#202225;color:white;
}

.authBox button{
width:100%;padding:10px;margin-top:15px;border:none;border-radius:5px;
background:#5865f2;color:white;cursor:pointer;
}

.link{text-align:center;margin-top:10px;font-size:13px;}
.link span{color:#00b0f4;text-decoration:underline;cursor:pointer;}

#app{display:none;height:100vh;flex-direction:row;}

#users{
width:220px;background:#2f3136;padding:10px;overflow:auto;
}

.user{
padding:6px;border-radius:5px;cursor:pointer;
display:flex;justify-content:space-between;
}

.user:hover{background:#40444b;}

.deleteUser{color:red;cursor:pointer;}

#chatArea{flex:1;display:flex;flex-direction:column;}

#messages{flex:1;overflow:auto;padding:10px;}

.message{
background:#40444b;padding:6px;border-radius:6px;margin-bottom:5px;
}

#sendBar{display:flex;padding:10px;background:#40444b;gap:5px;}

#sendBar input{
flex:1;padding:10px;border:none;border-radius:5px;
background:#2f3136;color:white;
}

#sendBar button{
padding:10px;border:none;border-radius:5px;
background:#5865f2;color:white;cursor:pointer;
}
</style>
</head>

<body>

<div class="authBox" id="loginBox">
<h2>Connexion</h2>
<input id="loginPseudo" placeholder="Pseudo">
<input id="loginPass" type="password" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>
<div class="link">Pas de compte ? <span onclick="showRegister()">Créer</span></div>
</div>

<div class="authBox" id="registerBox" style="display:none">
<h2>Créer un compte</h2>
<input id="regPseudo" placeholder="Pseudo">
<input id="regPass" type="password" placeholder="Mot de passe">
<button onclick="register()">Créer</button>
<button onclick="backLogin()">Retour</button>
</div>

<div id="app">

<div id="users">
<h3>Utilisateurs</h3>
<div id="userList"></div>
</div>

<div id="chatArea">
<div id="messages"></div>
<div id="sendBar">
<input id="msgInput" placeholder="Message">
<button onclick="sendMessage()">Envoyer</button>
</div>
</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getDatabase, ref, set, get, push, remove, onChildAdded, off} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAOvOV47JhlAUS1j5IaaCToDKYUrp4xHYw",
authDomain:"lenomioficialchat.firebaseapp.com",
databaseURL:"https://lenomioficialchat-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"lenomioficialchat"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase();

let pseudo="";
let currentChat="";
let currentRef=null;
let isAdmin=false;

/* LOGIN */
window.login=async function(){

let p=loginPseudo.value
let pass=loginPass.value

if(p==="lenomi" && pass==="Laville33"){
pseudo=p; isAdmin=true; startApp(); return;
}

let snap=await get(ref(db,"users/"+p))
if(!snap.exists()){alert("Compte introuvable");return}
if(snap.val().password!=pass){alert("Mot de passe incorrect");return}

pseudo=p
startApp()

}

/* START */
function startApp(){
loginBox.style.display="none"
document.getElementById("app").style.display="flex"
loadUsers()
watchDeletion()
}

/* REGISTER */
window.register=async function(){
await set(ref(db,"users/"+regPseudo.value),{
password:regPass.value
})
alert("Compte créé")
backLogin()
}

window.showRegister=function(){loginBox.style.display="none";registerBox.style.display="block"}
window.backLogin=function(){registerBox.style.display="none";loginBox.style.display="block"}

/* USERS */
function loadUsers(){

userList.innerHTML=""

onChildAdded(ref(db,"users"),data=>{

let name=data.key

if(name===pseudo) return // 👈 FIX

let div=document.createElement("div")
div.className="user"

let del=""
if(isAdmin && name!=="lenomi"){
del=`<span class="deleteUser" onclick="deleteUser('${name}')">✖</span>`
}

div.innerHTML=`<span onclick="openChat('${name}')">${name}</span>${del}`

userList.appendChild(div)

})

}

/* CHAT ID */
function getChatId(a,b){
return [a,b].sort().join("_")
}

/* OPEN CHAT */
function openChat(other){

currentChat=getChatId(pseudo,other)

messages.innerHTML=""

if(currentRef) off(currentRef)

let chatRef=ref(db,"messages/"+currentChat)
currentRef=chatRef

onChildAdded(chatRef,data=>{

let m=data.val()

let div=document.createElement("div")
div.className="message"
div.innerHTML="<b>"+m.from+"</b> : "+m.text

messages.appendChild(div)

})

}

/* SEND */
window.sendMessage=function(){

let text=msgInput.value
if(!text || !currentChat) return

push(ref(db,"messages/"+currentChat),{
from:pseudo,
text:text
})

msgInput.value=""

}

msgInput.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

/* DELETE USER */
window.deleteUser=function(user){
if(!isAdmin) return
remove(ref(db,"users/"+user))
}

/* KICK */
function watchDeletion(){

setInterval(async()=>{
let snap=await get(ref(db,"users/"+pseudo))
if(!snap.exists()){
document.body.innerHTML=`
<div style="text-align:center;margin-top:100px;">
<h2>Ton compte a été supprimé</h2>
<button onclick="location.reload()">Recharger</button>
</div>`
}
},2000)

}

</script>

</body>
</html>
