<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tellurium-Chat</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#121212; color:#fff; }
h2 { text-align:center; color:#00bfff; }
.container { max-width:600px; margin:20px auto; }
button, input { padding:10px; border-radius:12px; border:none; margin:5px 0; width:100%; box-sizing:border-box; }
button { background:#00bfff; color:#fff; font-weight:bold; cursor:pointer; }
button:hover { background:#009acd; }
#chat { height:50vh; overflow:auto; background:#1f1f1f; padding:15px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.3); margin-bottom:10px; }
#chat p { background:#272727; padding:8px 12px; border-radius:12px; margin:5px 0; }
.hidden { display:none; }
.adminMessageBtn { cursor:pointer; color:red; margin-left:10px; }
#adminPanel { margin-bottom:10px; background:#222; padding:10px; border-radius:12px; }
#onlineCount, #version { text-align:center; color:#aaa; margin:5px 0; }
</style>
</head>
<body>

<div class="container" id="menu">
<h2>Tellurium-Chat</h2>
<button onclick="showLogin()">Se connecter</button>
<button onclick="showRegister()">Créer un compte</button>
<div id="version">Version : 1.0.0</div>
</div>

<div class="container hidden" id="register">
<h2>Créer un compte</h2>
<input id="regPseudo" placeholder="Pseudo">
<input id="regPassword" type="password" placeholder="Mot de passe">
<button onclick="register()">Créer</button>
<button onclick="backMenu('register')">Retour</button>
<p id="regMessage"></p>
</div>

<div class="container hidden" id="login">
<h2>Se connecter</h2>
<input id="logPseudo" placeholder="Pseudo">
<input id="logPassword" type="password" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>
<button onclick="backMenu('login')">Retour</button>
<p id="logMessage"></p>
</div>

<div class="container hidden" id="chatContainer">
<div id="adminPanel" class="hidden"></div>
<div id="onlineCount"></div>
<div id="chat"></div>
<input id="msg" placeholder="Écris ton message">
<button onclick="send()">Envoyer</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onChildRemoved, get, child, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Config Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAOvOV47JhlAUS1j5IaaCToDKYUrp4xHYw",
  authDomain: "lenomioficialchat.firebaseapp.com",
  databaseURL: "https://lenomioficialchat-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lenomioficialchat",
  storageBucket: "lenomioficialchat.firebasestorage.app",
  messagingSenderId: "501612652553",
  appId: "1:501612652553:web:2aa454ea5378e6a079f0d8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase();

let currentPseudo = "";
let isAdmin = false;

// Menu affichage
function showLogin(){document.getElementById('menu').classList.add('hidden'); document.getElementById('login').classList.remove('hidden');}
function showRegister(){document.getElementById('menu').classList.add('hidden'); document.getElementById('register').classList.remove('hidden');}
function backMenu(id){document.getElementById(id).classList.add('hidden'); document.getElementById('menu').classList.remove('hidden');}

// Créer compte
async function register(){
  const pseudo = document.getElementById('regPseudo').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  const msg = document.getElementById('regMessage');
  msg.textContent = "";
  if(!pseudo || !password){ msg.textContent="Remplis tous les champs !"; return; }

  const snapshot = await get(child(ref(db), 'users'));
  const users = snapshot.val() || {};
  if(Object.values(users).some(u=>u.pseudo===pseudo)){ msg.textContent="Pseudo déjà utilisé !"; return; }

  const newUserRef = ref(db,'users/'+pseudo);
  await set(newUserRef,{ pseudo, password });
  msg.textContent="Compte créé avec succès !";
  document.getElementById('regPseudo').value=""; document.getElementById('regPassword').value="";
}

// Connexion
async function login(){
  const pseudo = document.getElementById('logPseudo').value.trim();
  const password = document.getElementById('logPassword').value.trim();
  const msg = document.getElementById('logMessage');
  msg.textContent="";

  // Admin hardcodé
  if(pseudo==="lenomi" && password==="Laville33"){
      currentPseudo = pseudo;
      isAdmin = true;
      document.getElementById('login').classList.add('hidden');
      document.getElementById('chatContainer').classList.remove('hidden');
      initChat(true);
      return;
  }

  const snapshot = await get(child(ref(db), 'users/'+pseudo));
  const user = snapshot.val();
  if(!user){ msg.textContent="Pseudo introuvable !"; return; }
  if(user.password!==password){ msg.textContent="Mot de passe incorrect !"; return; }

  currentPseudo = pseudo;
  isAdmin = false;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('chatContainer').classList.remove('hidden');

  set(ref(db,'onlineUsers/'+currentPseudo),true);
  initChat(false);
}

// Rainbow pseudo
function rainbowText(text){
  const colors = ["#FF0000","#FF7F00","#FFFF00","#00FF00","#0000FF","#4B0082","#8B00FF"];
  let html = "";
  for(let i=0;i<text.length;i++){ html += `<span style="color:${colors[i%colors.length]}; font-weight:bold;">${text[i]}</span>`; }
  return html;
}

// Initialiser chat
function initChat(admin=false){
  const chatDiv = document.getElementById('chat');
  chatDiv.innerHTML="";

  const onlineDiv = document.getElementById('onlineCount');
  const onlineRef = ref(db,'onlineUsers');

  // Listener online
  onChildAdded(onlineRef,updateOnlineCount);
  onChildRemoved(onlineRef,updateOnlineCount);
  function updateOnlineCount(){
    get(onlineRef).then(snap=>{
      const val = snap.val() || {};
      onlineDiv.textContent = "Personnes en ligne : " + Object.keys(val).length;
    });
  }

  // Messages en direct
  const messagesRef = ref(db,'messages');
  onChildAdded(messagesRef, data=>{
    const val = data.val();
    const key = data.key;
    let displayPseudo = val.pseudo;
    if(val.pseudo==="lenomi") displayPseudo = rainbowText(val.pseudo);
    let html = `<p id="msg-${key}"><b>${displayPseudo} :</b> ${val.text}`;
    if(admin) html += ` <span class="adminMessageBtn" onclick="deleteMessage('${key}')">❌</span>`;
    html += `</p>`;
    chatDiv.innerHTML += html;
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });

  onChildRemoved(messagesRef, data=>{
    const key = data.key;
    const msgElem = document.getElementById('msg-'+key);
    if(msgElem) msgElem.remove();
  });

  // Admin panel
  const adminPanel = document.getElementById('adminPanel');
  if(admin){
    adminPanel.classList.remove('hidden');
    adminPanel.innerHTML = `<h3>Admin Panel</h3><button onclick="showUsers()">Gérer les comptes</button><div id="usersDiv"></div>`;
  } else { adminPanel.classList.add('hidden'); }
}

// Supprimer message
function deleteMessage(key){ if(!isAdmin) return; set(ref(db,'messages/'+key),null); }

// Afficher comptes
async function showUsers(){
  const snapshot = await get(ref(db,'users'));
  const users = snapshot.val();
  let html = "<h4>Comptes :</h4>";
  for(let u in users){
    html += `<p>${users[u].pseudo} <button style="color:red;" onclick="deleteUser('${u}')">Supprimer</button></p>`;
  }
  document.getElementById('usersDiv').innerHTML = html;
}

// Supprimer compte
function deleteUser(pseudo){
  if(!isAdmin) return;
  set(ref(db,'users/'+pseudo),null);
  set(ref(db,'onlineUsers/'+pseudo),null);
  if(currentPseudo===pseudo){ alert("Ton compte a été supprimé par l'admin !"); location.reload(); }
}

// Envoyer message
function send(){
  const text = document.getElementById('msg').value.trim();
  if(!text) return;
  push(ref(db,'messages'), { pseudo: currentPseudo, text });
  document.getElementById('msg').value="";
}

// Supprimer online à la fermeture
window.onbeforeunload = () => { if(!isAdmin) set(ref(db,'onlineUsers/'+currentPseudo),null); };

window.send=send; window.register=register; window.login=login;
window.showLogin=showLogin; window.showRegister=showRegister; window.backMenu=backMenu;
window.showUsers=showUsers; window.deleteMessage=deleteMessage; window.deleteUser=deleteUser;

</script>

</body>
</html>
