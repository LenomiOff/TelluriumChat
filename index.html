<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tellurium Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#36393f;
color:white;
}

/* LOGIN */

.authBox{
width:360px;
background:#2f3136;
padding:30px;
border-radius:8px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.authBox input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
background:#202225;
color:white;
}

.authBox button{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:5px;
background:#5865f2;
color:white;
font-weight:bold;
cursor:pointer;
}

.link{
margin-top:10px;
font-size:13px;
text-align:center;
}

.link span{
color:#00b0f4;
text-decoration:underline;
cursor:pointer;
}

/* APP */

#app{
display:none;
height:100vh;
}

#channels{
width:220px;
background:#2f3136;
padding:10px;
overflow:auto;
}

.channel{
padding:6px;
border-radius:5px;
cursor:pointer;
}

.channel:hover{
background:#40444b;
}

#chatArea{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:15px;
}

.message{
background:#40444b;
padding:8px;
border-radius:6px;
margin-bottom:6px;
}

#sendBar{
padding:10px;
background:#40444b;
}

#sendBar input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#2f3136;
color:white;
}

.topBar{
position:absolute;
top:10px;
right:20px;
display:flex;
gap:10px;
}

.panel{
position:absolute;
top:50px;
right:20px;
background:#2f3136;
padding:15px;
border-radius:8px;
display:none;
width:250px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="authBox" id="loginBox">

<h2>Connexion</h2>

<input id="loginPseudo" placeholder="Pseudo">
<input id="loginPass" type="password" placeholder="Mot de passe">

<button onclick="login()">Se connecter</button>

<div class="link">
Vous n'avez pas de compte ?
<span onclick="showRegister()">Créez-en un</span>
</div>

</div>

<!-- REGISTER -->

<div class="authBox" id="registerBox" style="display:none">

<h2>Créer un compte</h2>

<input id="regPseudo" placeholder="Pseudo">
<input id="regPass" type="password" placeholder="Mot de passe">

<button onclick="register()">Créer</button>
<button onclick="backLogin()">Retour</button>

</div>

<!-- APP -->

<div id="app">

<div class="topBar">

<button onclick="openFriends()">Friends</button>
<button onclick="openNotif()">Notifications</button>

</div>

<div id="channels">

<h3>Salons</h3>

<div id="channelList"></div>

<button onclick="createChannel()">Créer un salon</button>

</div>

<div id="chatArea">

<div id="messages"></div>

<div id="sendBar">
<input id="msgInput" placeholder="Envoyer un message">
</div>

</div>

</div>

<!-- FRIEND PANEL -->

<div id="friendsPanel" class="panel">

<h3>Ajouter ami</h3>

<input id="friendPseudo" placeholder="Pseudo">

<button onclick="sendFriendRequest()">Envoyer</button>

<div id="friendsList"></div>

</div>

<!-- NOTIF PANEL -->

<div id="notifPanel" class="panel">

<h3>Notifications</h3>

<div id="notifList"></div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
get,
onChildAdded,
onChildRemoved
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAOvOV47JhlAUS1j5IaaCToDKYUrp4xHYw",
authDomain:"lenomioficialchat.firebaseapp.com",
databaseURL:"https://lenomioficialchat-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"lenomioficialchat"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase();

let pseudo="";
let currentChannel="";
let isAdmin=false;

/* LOGIN */

window.login=async function(){

let p=loginPseudo.value
let pass=loginPass.value

if(p==="lenomi" && pass==="Laville33"){
pseudo=p
isAdmin=true
}

let snap=await get(ref(db,"users/"+p))

if(!snap.exists() && !isAdmin){
alert("Compte introuvable")
return
}

if(!isAdmin && snap.val().password!=pass){
alert("Mot de passe incorrect")
return
}

pseudo=p

loginBox.style.display="none"
app.style.display="flex"

loadChannels()

}

/* REGISTER */

window.register=async function(){

let p=regPseudo.value
let pass=regPass.value

await set(ref(db,"users/"+p),{
password:pass
})

alert("Compte créé")

backLogin()

}

window.showRegister=function(){
loginBox.style.display="none"
registerBox.style.display="block"
}

window.backLogin=function(){
registerBox.style.display="none"
loginBox.style.display="block"
}

/* CHANNELS */

function loadChannels(){

onChildAdded(ref(db,"channels"),data=>{

let name=data.key

let div=document.createElement("div")
div.className="channel"
div.innerText="# "+name
div.onclick=()=>openChannel(name)

channelList.appendChild(div)

})

}

window.createChannel=async function(){

let name=prompt("Nom du salon")

if(!name)return

let snap=await get(ref(db,"channels"))
let channels=snap.val()||{}

for(let c in channels){

if(channels[c].owner==pseudo){
alert("Tu as déjà un salon")
return
}

}

await set(ref(db,"channels/"+name),{
owner:pseudo
})

}

/* OPEN CHANNEL */

function openChannel(name){

currentChannel=name
messages.innerHTML=""

onChildAdded(ref(db,"channels/"+name+"/messages"),data=>{

let m=data.val()

let div=document.createElement("div")
div.className="message"

div.innerHTML="<b>"+m.pseudo+"</b> : "+m.text

messages.appendChild(div)

})

}

/* SEND MESSAGE */

msgInput.addEventListener("keypress",e=>{

if(e.key=="Enter"){

let text=e.target.value

push(ref(db,"channels/"+currentChannel+"/messages"),{
pseudo:pseudo,
text:text
})

e.target.value=""

}

})

/* FRIEND SYSTEM */

window.sendFriendRequest=async function(){

let target=friendPseudo.value

await set(ref(db,"friendRequests/"+target+"/"+pseudo),true)

alert("Demande envoyée")

}

window.openNotif=function(){

notifPanel.style.display="block"
notifList.innerHTML=""

onChildAdded(ref(db,"friendRequests/"+pseudo),data=>{

let from=data.key

let div=document.createElement("div")

div.innerHTML=from+
` <button onclick="acceptFriend('${from}')">Accepter</button>
<button onclick="declineFriend('${from}')">Refuser</button>`

notifList.appendChild(div)

})

}

window.acceptFriend=async function(user){

await set(ref(db,"friends/"+pseudo+"/"+user),true)
await set(ref(db,"friends/"+user+"/"+pseudo),true)

set(ref(db,"friendRequests/"+pseudo+"/"+user),null)

openNotif()

}

window.declineFriend=function(user){

set(ref(db,"friendRequests/"+pseudo+"/"+user),null)

openNotif()

}

window.openFriends=function(){

friendsPanel.style.display="block"

}

</script>

</body>
</html>
